<!DOCTYPE html>
<html>
<body style="text-align:center;font-family:sans-serif;">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="image" placeholder="Image URL"><br><br>

<button onclick="add()">Add Product</button>

<p id="msg"></p>

<script>
function add(){

// ✅ Get values correctly
let nameValue = document.getElementById("name").value;
let priceValue = document.getElementById("price").value;
let imageValue = document.getElementById("image").value;

// ✅ Basic validation
if(nameValue === "" || priceValue === "" || imageValue === ""){
document.getElementById("msg").innerText = "Please fill all fields!";
return;
}

// ✅ Send to backend
fetch("/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: nameValue,
price: priceValue,
image: imageValue
})
})
.then(res=>res.text())
.then(data=>{
document.getElementById("msg").innerText = data;

// ✅ Clear inputs after adding
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
});
}
</script>

</body>
</html>
