<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products – Beauty Store</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #4a1d96;
    --purple-mid: #6d28d9;
    --purple-light: #8b5cf6;
    --purple-soft: #ede9fe;
    --text: #1f1235;
    --gray: #6b7280;
    --border: #e5e7eb;
  }
  body { font-family: 'Nunito', sans-serif; background: #f3f0ff; color: var(--text); min-height: 100vh; }

  nav {
    background: var(--purple);
    padding: 14px 30px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(74,29,150,0.4);
  }
  nav .logo { color: white; font-size: 1.5rem; font-weight: 800; text-decoration: none; }
  nav .logo span { color: #f9a8d4; }
  nav .links a {
    color: rgba(255,255,255,0.85); text-decoration: none;
    margin-left: 22px; font-weight: 600; font-size: 0.9rem;
  }
  nav .links a:hover { color: white; }
  nav .links a.active { color: #f9a8d4; border-bottom: 2px solid #f9a8d4; padding-bottom: 2px; }
  .cart-badge {
    background: #f9a8d4; color: var(--purple);
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 0.7rem; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 3px; vertical-align: middle;
  }

  /* SEARCH + FILTER BAR */
  .top-bar {
    background: white; padding: 16px 30px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    display: flex; align-items: center; gap: 10px;
    background: var(--purple-soft); border-radius: 10px;
    padding: 10px 16px;
  }
  .search-box input {
    border: none; outline: none; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: 0.92rem; flex: 1; color: var(--text);
  }
  .sort-select {
    padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-family: 'Nunito', sans-serif;
    font-size: 0.88rem; outline: none; cursor: pointer;
    color: var(--text); background: white;
  }
  .sort-select:focus { border-color: var(--purple-light); }

  /* PRODUCT COUNT */
  .products-label {
    padding: 14px 30px 0;
    font-weight: 800; color: var(--purple); font-size: 1rem;
  }

  /* GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 22px;
    padding: 18px 30px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product-card {
    background: white; border-radius: 16px;
    box-shadow: 0 2px 10px rgba(109,40,217,0.07);
    overflow: hidden; transition: transform 0.25s, box-shadow 0.25s;
    border: 1px solid var(--border);
    position: relative;
  }
  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 28px rgba(109,40,217,0.16);
  }

  .product-card img {
    width: 100%; height: 200px; object-fit: cover;
    transition: transform 0.3s;
  }
  .product-card:hover img { transform: scale(1.04); }

  .wish-heart {
    position: absolute; top: 10px; right: 10px;
    width: 34px; height: 34px; border-radius: 50%;
    background: white; border: none; cursor: pointer;
    font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s; z-index: 2;
  }
  .wish-heart:hover { transform: scale(1.2); }
  .wish-heart.active { background: #ffe4e6; }

  .card-body { padding: 16px; }
  .card-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; color: var(--text); }
  .card-price { font-size: 1.15rem; font-weight: 800; color: var(--purple); margin-bottom: 14px; }

  .card-btns { display: flex; gap: 8px; }
  .btn-cart {
    flex: 1; background: var(--purple-mid); color: white;
    border: none; padding: 10px; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.85rem; cursor: pointer; transition: background 0.2s;
  }
  .btn-cart:hover { background: var(--purple); }

  /* LOADING SKELETON */
  .skeleton {
    background: #e5e7eb; border-radius: 16px;
    animation: shimmer 1.2s infinite;
  }
  .skel-img { height: 200px; }
  .skel-body { padding: 16px; }
  .skel-line { height: 14px; border-radius: 6px; margin-bottom: 8px; background: #e5e7eb; }
  @keyframes shimmer {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }

  /* EMPTY */
  .empty-state {
    text-align: center; padding: 70px 20px; grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
  .empty-state h3 { font-size: 1.3rem; font-weight: 800; color: var(--purple); }
  .empty-state p { color: var(--gray); margin-top: 6px; }

  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--purple); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-weight: 700; opacity: 0; transform: translateY(10px);
    transition: all 0.3s; z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .products-grid { padding: 16px; gap: 16px; }
    nav .links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Beauty<span>Store</span></a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="products.html" class="active">Products</a>
    <a href="cart.html">Cart 🛒 <span class="cart-badge" id="cart-badge">0</span></a>
    <a href="wishlist.html">Wishlist ❤️</a>
    <a href="orders.html">Orders 📦</a>
  </div>
</nav>

<div class="top-bar">
  <div class="search-box">
    🔍 <input id="search-input" type="text" placeholder="Search products..." oninput="filterProducts()">
  </div>
  <select class="sort-select" id="sort-select" onchange="filterProducts()">
    <option value="default">Sort: Default</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="name-az">Name: A–Z</option>
  </select>
</div>

<div class="products-label" id="products-label">Loading products...</div>
<div class="products-grid" id="products-grid">
  ${Array(8).fill(`<div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line" style="width:70%"></div><div class="skel-line" style="width:40%"></div></div></div>`).join("")}
</div>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];
let wishSet = new Set((JSON.parse(localStorage.getItem("wish")) || []).map(w => w.id));

// Update cart badge
function updateBadge() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cart-badge").textContent = cart.length;
}
updateBadge();

// FETCH ONLY FROM DB (admin added products)
fetch("/products")
  .then(r => r.json())
  .then(data => {
    allProducts = data;
    filterProducts();
  })
  .catch(() => {
    document.getElementById("products-grid").innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><h3>Could not load products</h3><p>Make sure your server is running.</p></div>`;
    document.getElementById("products-label").textContent = "Error loading products";
  });

function filterProducts() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const sort = document.getElementById("sort-select").value;

  let filtered = allProducts.filter(p => p.name.toLowerCase().includes(q));

  if (sort === "price-low") filtered.sort((a, b) => a.price - b.price);
  else if (sort === "price-high") filtered.sort((a, b) => b.price - a.price);
  else if (sort === "name-az") filtered.sort((a, b) => a.name.localeCompare(b.name));

  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById("products-grid");
  const label = document.getElementById("products-label");

  label.textContent = `Showing ${products.length} product${products.length !== 1 ? "s" : ""}`;

  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h3>No products found</h3>
        <p>Try a different search or add products from the admin panel.</p>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/220x200?text=Product'">
      <button class="wish-heart ${wishSet.has(p.id) ? "active" : ""}" onclick="toggleWish(this, ${JSON.stringify(p).replace(/"/g, '&quot;')})" title="Add to wishlist">
        ${wishSet.has(p.id) ? "❤️" : "🤍"}
      </button>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">₹${p.price}</div>
        <div class="card-btns">
          <button class="btn-cart" onclick='addCart(${JSON.stringify(p)})'>🛒 Add to Cart</button>
        </div>
      </div>
    </div>`).join("");
}

function addCart(p) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateBadge();
  toast("🛒 Added to cart!");
}

function toggleWish(btn, p) {
  let wish = JSON.parse(localStorage.getItem("wish")) || [];
  if (wishSet.has(p.id)) {
    wishSet.delete(p.id);
    wish = wish.filter(w => w.id !== p.id);
    btn.textContent = "🤍";
    btn.classList.remove("active");
    toast("Removed from wishlist");
  } else {
    wishSet.add(p.id);
    wish.push(p);
    btn.textContent = "❤️";
    btn.classList.add("active");
    toast("❤️ Added to wishlist!");
  }
  localStorage.setItem("wish", JSON.stringify(wish));
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
</script>
</body>
</html>
