<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist – Beauty Store</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #4a1d96;
    --purple-mid: #6d28d9;
    --purple-light: #8b5cf6;
    --purple-soft: #ede9fe;
    --pink: #f9a8d4;
    --text: #1f1235;
    --gray: #6b7280;
    --border: #e5e7eb;
  }
  body { font-family: 'Nunito', sans-serif; background: #f3f0ff; color: var(--text); min-height: 100vh; }

  nav {
    background: var(--purple);
    padding: 14px 30px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(74,29,150,0.4);
  }
  nav .logo { color: white; font-size: 1.5rem; font-weight: 800; text-decoration: none; }
  nav .logo span { color: #f9a8d4; }
  nav .links a {
    color: rgba(255,255,255,0.85); text-decoration: none;
    margin-left: 22px; font-weight: 600; font-size: 0.9rem;
  }
  nav .links a:hover { color: white; }
  nav .links a.active { color: #f9a8d4; border-bottom: 2px solid #f9a8d4; padding-bottom: 2px; }

  .page-header {
    background: white; padding: 24px 30px;
    border-bottom: 1px solid var(--border);
  }
  .page-header h1 { font-size: 1.7rem; font-weight: 800; color: var(--purple); }
  .page-header p { color: var(--gray); font-size: 0.9rem; margin-top: 3px; }

  .main { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

  .wish-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 22px;
  }

  .wish-card {
    background: white; border-radius: 16px;
    box-shadow: 0 2px 12px rgba(109,40,217,0.07);
    overflow: hidden; transition: transform 0.25s, box-shadow 0.25s;
    border: 1px solid var(--border);
    position: relative;
  }
  .wish-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 24px rgba(109,40,217,0.15);
  }

  .wish-card img {
    width: 100%; height: 200px; object-fit: cover;
  }

  .wish-remove {
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: white; border: none; cursor: pointer;
    font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .wish-remove:hover { transform: scale(1.15); background: #fee2e2; }

  .wish-info { padding: 16px; }
  .wish-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; }
  .wish-price { font-size: 1.1rem; font-weight: 800; color: var(--purple); margin-bottom: 14px; }

  .wish-card-btns { display: flex; gap: 8px; }
  .btn-add-cart {
    flex: 1; background: var(--purple-mid); color: white;
    border: none; padding: 10px; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.85rem; cursor: pointer; transition: background 0.2s;
  }
  .btn-add-cart:hover { background: var(--purple); }

  /* EMPTY */
  .empty-state {
    text-align: center; padding: 70px 20px;
    background: white; border-radius: 16px;
    max-width: 500px; margin: 0 auto;
  }
  .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
  .empty-state h3 { font-size: 1.3rem; font-weight: 800; color: var(--purple); margin-bottom: 8px; }
  .empty-state p { color: var(--gray); margin-bottom: 24px; }
  .shop-btn {
    background: var(--purple-mid); color: white; text-decoration: none;
    padding: 12px 28px; border-radius: 10px; font-weight: 700;
    display: inline-block; transition: background 0.2s;
  }
  .shop-btn:hover { background: var(--purple); }

  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--purple); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-weight: 700; opacity: 0; transform: translateY(10px);
    transition: all 0.3s; z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Beauty<span>Store</span></a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart 🛒</a>
    <a href="wishlist.html" class="active">Wishlist ❤️</a>
    <a href="orders.html">Orders 📦</a>
  </div>
</nav>

<div class="page-header">
  <h1>❤️ My Wishlist</h1>
  <p id="wish-count">Your saved products</p>
</div>

<div class="main">
  <div id="wish-grid" class="wish-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let wish = JSON.parse(localStorage.getItem("wish")) || [];

function render() {
  const grid = document.getElementById("wish-grid");
  document.getElementById("wish-count").textContent =
    wish.length > 0 ? `${wish.length} saved product${wish.length !== 1 ? "s" : ""}` : "No items saved yet";

  if (wish.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">💜</div>
        <h3>Your wishlist is empty!</h3>
        <p>Save products you love by clicking the ❤️ button.</p>
        <a href="products.html" class="shop-btn">Browse Products</a>
      </div>`;
    return;
  }

  grid.innerHTML = wish.map((p, i) => `
    <div class="wish-card">
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/240x200?text=Product'">
      <button class="wish-remove" title="Remove" onclick="removeWish(${i})">✕</button>
      <div class="wish-info">
        <div class="wish-name">${p.name}</div>
        <div class="wish-price">₹${p.price}</div>
        <div class="wish-card-btns">
          <button class="btn-add-cart" onclick="addToCart(${i})">🛒 Add to Cart</button>
        </div>
      </div>
    </div>`).join("");
}

function removeWish(i) {
  wish.splice(i, 1);
  localStorage.setItem("wish", JSON.stringify(wish));
  render();
  toast("Removed from wishlist");
}

function addToCart(i) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(wish[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  toast("🛒 Added to cart!");
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

render();
</script>
</body>
</html>
